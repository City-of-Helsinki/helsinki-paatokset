  field_decision_motion:
    -
      value: '<html lang="fi"><head><META content="text/html; charset=UTF-8" http-equiv="Content-Type"><META name="DhId" content="{9324907C-570B-CDD9-9AD6-9A7809C00000}"><META name="ThisHTMLGenerated" content="2025-11-12T14:31:05.676+02:00"><title>Kaupunginvaltuuston kokousajat vuonna 2026</title></head><body><div class="esitys"><div class="SisaltoSektio"><h3 class="SisaltoOtsikko">Päätösehdotus</h3><div><p>Päätös on ehdotuksen mukainen.</p></div></div><div class="SisaltoSektio"><h3 class="SisaltoOtsikko">Esittelijän perustelut</h3><div><p>Kuntalain (410/2015) 94 §:n 1 momentin mukaan valtuusto kokoontuu päättäminään aikoina ja myös silloin, kun valtuuston puheenjohtaja katsoo sen tarpeelliseksi. Saman pykälän 2 momentin mukaan valtuusto on kutsuttava koolle myös kunnanhallituksen tai vähintään neljäsosan valtuutetuista sitä pyytäessä ilmoittamansa asian käsittelyä varten.</p><p>Puheenjohtaja voi hallintosäännön 29 luvun 2 §:n 3 momentin mukaan peruuttaa kokouksen tai muuttaa kokouksen alkamisaikaa päätettynä kokouspäivänä asioiden vähäisen määrän tai muun erityisen syyn vuoksi.</p><p>Kaupunginvaltuuston kokouskutsu lähetetään sähköisesti vähintään neljä päivää ennen kokousta, samalla julkaistaan kokouksen esityslista yleisessä tietoverkossa.</p><p>Kaupunginvaltuuston pöytäkirja siihen liitettyine oikaisuvaatimusohjeineen tai valitusosoituksineen pidetään tarkastamisen jälkeen nähtävänä yleisessä tietoverkossa kuntalain 140 §:n mukaisesti.</p></div></div><h3 class="EsittelijaTiedot">Esittelijä</h3><div></div><div>Kaupunginvaltuuston puheenjohtaja</div><h3 class="LisatiedotOtsikko">Lisätiedot</h3><p>Helmi Kehä, hallintosuunnittelija, puhelin: 09 310 56863<div>helmi.keha@hel.fi</div></p><h3 class="MuutoksenhakuOtsikko">Muutoksenhaku</h3><p>Muutoksenhakukielto, valmistelu tai täytäntöönpano</p><h3 class="OtteetOtsikko">Otteet</h3><table><thead><tr><th>Ote</th><th>Otteen liitteet</th></tr></thead><tbody><tr><td>Kokouksissa läsnäolo- ja puheoikeutetut</td><td><div></div></td></tr><tr><td>Kaupunginvaltuuston jäsenet ja varajäsenet</td><td><div></div></td></tr></tbody></table></div></body></html>'
      format: plain_text
  field_decision_motion_parsed:
    -
      value: '<h3 class="SisaltoOtsikko">Päätösehdotus</h3><p>Päätös on ehdotuksen mukainen.</p><h3 class="SisaltoOtsikko">Esittelijän perustelut</h3><p>Kuntalain (410/2015) 94 §:n 1 momentin mukaan valtuusto kokoontuu päättäminään aikoina ja myös silloin, kun valtuuston puheenjohtaja katsoo sen tarpeelliseksi. Saman pykälän 2 momentin mukaan valtuusto on kutsuttava koolle myös kunnanhallituksen tai vähintään neljäsosan valtuutetuista sitä pyytäessä ilmoittamansa asian käsittelyä varten.</p><p>Puheenjohtaja voi hallintosäännön 29 luvun 2 §:n 3 momentin mukaan peruuttaa kokouksen tai muuttaa kokouksen alkamisaikaa päätettynä kokouspäivänä asioiden vähäisen määrän tai muun erityisen syyn vuoksi.</p><p>Kaupunginvaltuuston kokouskutsu lähetetään sähköisesti vähintään neljä päivää ennen kokousta, samalla julkaistaan kokouksen esityslista yleisessä tietoverkossa.</p><p>Kaupunginvaltuuston pöytäkirja siihen liitettyine oikaisuvaatimusohjeineen tai valitusosoituksineen pidetään tarkastamisen jälkeen nähtävänä yleisessä tietoverkossa kuntalain 140 §:n mukaisesti.</p>'

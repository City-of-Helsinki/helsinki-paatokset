paatokset_search.decisions.fi:
  path: 'asia'
  defaults:
    _controller: '\Drupal\paatokset_search\Controller\SearchController::decisions'
    _title: 'Hae päätöksiä'
  requirements:
    _access: 'TRUE'

paatokset_search.decisions.sv:
  path: 'arende'
  defaults:
    _controller: '\Drupal\paatokset_search\Controller\SearchController::decisions'
    _title: 'Sök beslut'
  requirements:
    _access: 'TRUE'

paatokset_search.decisions.en:
  path: 'case'
  defaults:
    _controller: '\Drupal\paatokset_search\Controller\SearchController::decisions'
    _title: 'Search decisions'
  requirements:
    _access: 'TRUE'

paatokset_search.autocomplete:
  path: '/api/v1/paatokset-autocomplete'
  defaults:
    _controller: '\Drupal\paatokset_search\Controller\SearchController::autocomplete'
  requirements:
    _permission: 'access content'
